name: revendor-spec

# Keep the vendored crate /api/v2 spec in sync with the live API automatically — no cross-team
# pings. Daily (and on demand), fetch the live spec; if it drifted from spec/meta.json's hash,
# re-vendor + regenerate types/explorer/README, run the gate, and open (or update) a PR.
# Merging that PR triggers docs-deploy, so the docs follow the API team's spec changes on their own.

on:
  schedule:
    - cron: '0 7 * * *' # daily 07:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: revendor-spec
  cancel-in-progress: true

jobs:
  revendor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Re-vendor + regenerate
        id: regen
        run: |
          npm ci
          node scripts/vendor-spec.mjs   # fetch live → spec/openapi.json
          npm run generate               # regenerate types + meta from the vendored spec
          npm run docs:build             # regenerate explorer + README surface
          if [ -z "$(git status --porcelain -- spec src/generated explorer README.md)" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Spec already in sync — nothing to do."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "version=$(node -p "require('./spec/openapi.json').info.version")" >> "$GITHUB_OUTPUT"
          fi

      - name: Gate (typecheck + tests + lint)
        if: steps.regen.outputs.changed == 'true'
        run: |
          npm run typecheck
          npm test
          npx prettier --check .

      - name: Open / update re-vendor PR
        if: steps.regen.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BR=auto/revendor-spec
          git config user.name "crate-sdk-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B "$BR"
          git add spec src/generated explorer README.md
          git commit -m "chore(spec): re-vendor crate /api/v2 spec (auto)"
          git push -f origin "$BR"
          if [ -z "$(gh pr list --head "$BR" --state open --json number -q '.[0].number')" ]; then
            gh pr create --base main --head "$BR" \
              --title "chore(spec): re-vendor crate /api/v2 spec (auto)" \
              --body "Automated: the live \`/api/v2\` spec (info.version ${{ steps.regen.outputs.version }}) drifted from the vendored copy. Re-vendored + regenerated types/explorer/README; gate (typecheck · tests · lint) passed in CI. Review the diff and merge — docs-deploy then redeploys automatically. _Generated by .github/workflows/revendor-spec.yml._"
          else
            echo "Re-vendor PR already open — branch updated with the latest spec."
          fi
