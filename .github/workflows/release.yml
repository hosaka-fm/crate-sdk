name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      # egg-on Personal Access Token with write:packages — the GitHub Packages
      # publisher identity. Publishing is attributed to whichever account owns it.
      PACKAGES_TOKEN: ${{ secrets.EGGON_PACKAGES_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: 'https://npm.pkg.github.com'
          scope: '@hosaka-fm'
      - run: npm ci
      - run: npm run build

      # Publish to GitHub Packages, GATED: runs only when the PUBLISH_ENABLED repo
      # variable is "true" AND the egg-on packages token secret exists. Both gate
      # the first publish until the go is given.
      - name: Publish to GitHub Packages (gated)
        if: ${{ vars.PUBLISH_ENABLED == 'true' && env.PACKAGES_TOKEN != '' }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.EGGON_PACKAGES_TOKEN }}
        run: |
          npm pkg delete private
          npm publish

      - name: Publish skipped (gate closed)
        if: ${{ !(vars.PUBLISH_ENABLED == 'true' && env.PACKAGES_TOKEN != '') }}
        run: echo "Publish gated OFF (PUBLISH_ENABLED!=true or EGGON_PACKAGES_TOKEN absent). Build only."
