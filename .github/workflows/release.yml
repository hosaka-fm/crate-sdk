name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      # npm automation token for the Hosaka FM npm org (the @hosaka-fm scope owner).
      # The publishing identity is this npm account — never a personal account.
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: 'https://registry.npmjs.org'
      - run: npm ci
      - run: npm run build

      # Publish to the public npm registry, GATED: runs only when the PUBLISH_ENABLED
      # repo variable is "true" AND an NPM_TOKEN secret exists. Both gate the first
      # publish until the Hosaka FM npm org + token are set up and the go is given.
      - name: Publish to npm (gated)
        if: ${{ vars.PUBLISH_ENABLED == 'true' && env.NPM_TOKEN != '' }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          npm pkg delete private
          npm publish --access public

      - name: Publish skipped (gate closed)
        if: ${{ !(vars.PUBLISH_ENABLED == 'true' && env.NPM_TOKEN != '') }}
        run: echo "Publish gated OFF (PUBLISH_ENABLED!=true or NPM_TOKEN absent). Build only."
